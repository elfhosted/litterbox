name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: arc-runners
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: go build
        run: go build ./...
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
